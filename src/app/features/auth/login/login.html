<div class="container">
    <form class="login" (ngSubmit)="onLogin()">

        <fieldset>
            <h2>Login Form</h2>

            <p class="field field-icon">
                <label for="email"><span><i class="fas fa-envelope"></i></span></label>
                <input class="input-error" type="email" name="email" id="email" placeholder="john.doe@gmail.com" [(ngModel)]="email">
            </p>
            <!-- <p class="error">
                Email is required!
            </p> -->
            <!-- <p class="error">
                    Email is not valid!
                </p> -->

            <p class="field field-icon">
                <label for="password"><span><i class="fas fa-lock"></i></span></label>
                <input type="password" name="password" id="password" placeholder="******" [(ngModel)]="password">
            </p>
            <!-- <p class="error">
                    Password is required!
                </p>
                <p class="error">
                    Password must be at least 4 characters!
                </p> -->

            <button [disabled]="!email || !password" type="submit">Login</button>

            <p class="text-center">
                Don't have an account?
                <a routerLink="/register">Register</a>
            </p>

        </fieldset>
    </form>
</div>
